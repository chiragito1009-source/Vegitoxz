<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        .clock { font-size: 2em; margin: 20px; }
    </style>
</head>
<body>
    <h1>Digital Clock</h1>
    <div class="clock" id="clock"></div>
    <script>
        function updateTime() {
            const utcDate = new Date();
            const options = { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const utcTimeString = utcDate.toLocaleTimeString('en-US', options);

            const timeZones = {
                'PST': 'America/Los_Angeles',
                'MST': 'America/Denver',
                'CST': 'America/Chicago',
                'EST': 'America/New_York',
                'GMT': 'Europe/London',
                'CET': 'Europe/Berlin',
                'IST': 'Asia/Kolkata',
                'JST': 'Asia/Tokyo'
            };

            let clockDisplay = '<div>UTC: ' + utcTimeString + '</div>';
            for (let zone in timeZones) {
                const localDate = new Date();
                const localTimeString = localDate.toLocaleTimeString('en-US', { timeZone: timeZones[zone], hour: '2-digit', minute: '2-digit', second: '2-digit' });
                clockDisplay += '<div>' + zone + ': ' + localTimeString + '</div>';
            }

            document.getElementById('clock').innerHTML = clockDisplay;
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
